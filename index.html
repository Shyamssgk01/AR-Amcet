<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>WebAR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
}

/* Layer 1 (bottom): live camera feed */
#camera-bg {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  z-index: 1;
}

/* Layer 2: MindAR canvas — transparent, only used for detection */
a-scene {
  position: fixed !important;
  top: 0 !important; left: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 2 !important;
  background: transparent !important;
  pointer-events: none;
}

/* Force the A-Frame/Three.js canvas to be transparent */
a-scene canvas {
  background: transparent !important;
}

/* Layer 3 (top): stable video overlay */
#video-overlay {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90vw;
  max-width: 500px;
  aspect-ratio: 16 / 9;
  z-index: 10;
  display: none;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

#video-overlay video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.instruction-container {
  position: fixed;
  bottom: 30px;
  width: 100%;
  text-align: center;
  z-index: 20;
  pointer-events: none;
}

.instruction-text {
  font-size: 1rem;
  color: #4facfe;
  background: rgba(0,0,0,0.7);
  padding: 10px 20px;
  border-radius: 10px;
  border: 1px solid #4facfe;
  display: inline-block;
  text-transform: uppercase;
}

#unmute-btn {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  background: rgba(0,0,0,0.75);
  color: #fff;
  border: 1px solid #fff;
  border-radius: 8px;
  padding: 8px 18px;
  font-size: 0.9rem;
  cursor: pointer;
  display: none;
}
</style>
</head>

<body>

<!-- Layer 1: Real camera feed as background -->
<video id="camera-bg" autoplay playsinline muted></video>

<button id="unmute-btn">🔊 Tap to Unmute</button>

<!-- Layer 3: Stable video overlay -->
<div id="video-overlay">
  <video id="ar-video"
    src="./video.mp4"
    preload="auto"
    loop
    muted
    playsinline
    webkit-playsinline>
  </video>
</div>

<div class="instruction-container" id="instruction-container">
  <div class="instruction-text">Scan Amcet Logo</div>
</div>

<!-- Layer 2: MindAR — transparent canvas, detection only -->
<a-scene
  mindar-image="imageTargetSrc: ./targets.mind; uiScanning: no; uiLoading: no;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
  renderer="colorManagement: true; alpha: true; antialias: false;"
  color-space="sRGB">

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0" id="target">
    <a-box visible="false" width="0.001" height="0.001" depth="0.001"></a-box>
  </a-entity>

</a-scene>

<script>
const arVideo = document.getElementById('ar-video');
const cameraBg = document.getElementById('camera-bg');
const overlay = document.getElementById('video-overlay');
const target = document.getElementById('target');
const instruction = document.getElementById('instruction-container');
const unmuteBtn = document.getElementById('unmute-btn');

let visible = false;
let audioUnlocked = false;

arVideo.muted = true;
arVideo.setAttribute('playsinline', '');
arVideo.setAttribute('webkit-playsinline', '');

// ---- Step 1: Start real camera feed for background ----
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' }, // back camera
        width: { ideal: 1280 },
        height: { ideal: 720 }
      },
      audio: false
    });
    cameraBg.srcObject = stream;
  } catch (err) {
    console.warn('Camera access failed:', err);
  }
}

startCamera();

// ---- Step 2: Make A-Frame canvas transparent after scene loads ----
document.querySelector('a-scene').addEventListener('loaded', () => {
  setTimeout(() => {
    const sceneEl = document.querySelector('a-scene');
    // Hide MindAR's own internal camera video (we use our own #camera-bg)
    const mindARVideos = sceneEl.querySelectorAll('video');
    mindARVideos.forEach(v => {
      if (v.id !== 'ar-video') {
        v.style.display = 'none';
      }
    });
    // Make WebGL canvas transparent
    const canvas = sceneEl.querySelector('canvas');
    if (canvas) {
      canvas.style.background = 'transparent';
    }
  }, 500);
});

// ---- Audio unlock ----
function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;

  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (AudioContext) {
      const ctx = new AudioContext();
      ctx.resume();
    }
  } catch (e) {}

  arVideo.muted = false;
  if (visible && arVideo.paused) {
    arVideo.play().catch(() => {});
  }
  unmuteBtn.style.display = 'none';
}

document.addEventListener('click', unlockAudio);
document.addEventListener('touchend', unlockAudio);

// ---- Target detected ----
target.addEventListener('targetFound', () => {
  visible = true;
  instruction.style.display = 'none';
  overlay.style.display = 'block';

  arVideo.play().then(() => {
    if (!audioUnlocked) unmuteBtn.style.display = 'block';
  }).catch(() => {
    unmuteBtn.style.display = 'block';
  });
});

// ---- Target lost ----
target.addEventListener('targetLost', () => {
  visible = false;
  instruction.style.display = 'block';
  unmuteBtn.style.display = 'none';
  overlay.style.display = 'none';
  arVideo.pause();
  arVideo.currentTime = 0;
});

// ---- iOS 13+ DeviceOrientation permission ----
window.addEventListener('load', () => {
  if (
    typeof DeviceOrientationEvent !== 'undefined' &&
    typeof DeviceOrientationEvent.requestPermission === 'function'
  ) {
    const requestPerm = () => {
      DeviceOrientationEvent.requestPermission()
        .then(res => {
          if (res === 'granted') {
            window.addEventListener('deviceorientation', () => {});
          }
        })
        .catch(console.error);
      document.removeEventListener('touchend', requestPerm);
    };
    document.addEventListener('touchend', requestPerm);
  }
});
</script>

</body>
</html>
