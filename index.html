<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>WebAR Transparent</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
}

/* A-Frame scene fills screen as camera background */
a-scene {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 0 !important;
}

/* Stable video overlay — fixed center of screen, above camera */
#video-overlay {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90vw;
  max-width: 500px;
  aspect-ratio: 16 / 9;
  z-index: 10;
  display: none;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
}

#video-overlay video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* Instruction text */
.instruction-container {
  position: fixed;
  bottom: 30px;
  width: 100%;
  text-align: center;
  z-index: 20;
  pointer-events: none;
}

.instruction-text {
  font-size: 1rem;
  color: #4facfe;
  background: rgba(0, 0, 0, 0.7);
  padding: 10px 20px;
  border-radius: 10px;
  border: 1px solid #4facfe;
  display: inline-block;
  text-transform: uppercase;
}

/* Unmute button */
#unmute-btn {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  background: rgba(0, 0, 0, 0.75);
  color: #fff;
  border: 1px solid #fff;
  border-radius: 8px;
  padding: 8px 18px;
  font-size: 0.9rem;
  cursor: pointer;
  display: none;
}
</style>
</head>

<body>

<button id="unmute-btn">🔊 Tap to Unmute</button>

<!-- Stable video overlay — fixed on screen, NOT AR-tracked -->
<div id="video-overlay">
  <video id="ar-video"
    src="./video.mp4"
    preload="auto"
    loop
    muted
    playsinline
    webkit-playsinline>
  </video>
</div>

<div class="instruction-container" id="instruction-container">
  <div class="instruction-text">Scan Amcet Logo</div>
</div>

<!--
  A-Frame scene:
  - Renders the live camera feed as background
  - Detects the image target
  - No 3D video rendered here at all
-->
<a-scene
  mindar-image="imageTargetSrc: ./targets.mind; uiScanning: no; uiLoading: no;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
  renderer="colorManagement: true; alpha: true; antialias: false;"
  color-space="sRGB">

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- Detection only — invisible box, no video in AR space -->
  <a-entity mindar-image-target="targetIndex: 0" id="target">
    <a-box visible="false" width="0.001" height="0.001" depth="0.001"></a-box>
  </a-entity>

</a-scene>

<script>
const video = document.getElementById('ar-video');
const overlay = document.getElementById('video-overlay');
const target = document.getElementById('target');
const instruction = document.getElementById('instruction-container');
const unmuteBtn = document.getElementById('unmute-btn');

let visible = false;
let audioUnlocked = false;

video.muted = true;
video.setAttribute('playsinline', '');
video.setAttribute('webkit-playsinline', '');

// ---- Audio unlock (required for iOS) ----
function unlockAudio() {
  if (audioUnlocked) return;
  audioUnlocked = true;

  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (AudioContext) {
      const ctx = new AudioContext();
      ctx.resume();
    }
  } catch (e) {}

  video.muted = false;

  if (visible && video.paused) {
    video.play().catch(() => {});
  }

  unmuteBtn.style.display = 'none';
}

document.addEventListener('click', unlockAudio);
document.addEventListener('touchend', unlockAudio);

// ---- Image detected: show stable overlay ----
target.addEventListener('targetFound', () => {
  visible = true;
  instruction.style.display = 'none';
  overlay.style.display = 'block';

  video.play().then(() => {
    if (!audioUnlocked) {
      unmuteBtn.style.display = 'block';
    }
  }).catch(() => {
    unmuteBtn.style.display = 'block';
  });
});

// ---- Image lost: hide overlay ----
target.addEventListener('targetLost', () => {
  visible = false;
  instruction.style.display = 'block';
  unmuteBtn.style.display = 'none';
  overlay.style.display = 'none';
  video.pause();
  video.currentTime = 0;
});

// ---- iOS 13+: request DeviceOrientation permission on first touch ----
window.addEventListener('load', () => {
  if (
    typeof DeviceOrientationEvent !== 'undefined' &&
    typeof DeviceOrientationEvent.requestPermission === 'function'
  ) {
    const requestPerm = () => {
      DeviceOrientationEvent.requestPermission()
        .then(res => {
          if (res === 'granted') {
            window.addEventListener('deviceorientation', () => {});
          }
        })
        .catch(console.error);
      document.removeEventListener('touchend', requestPerm);
    };
    document.addEventListener('touchend', requestPerm);
  }
});
</script>

</body>
</html>
