<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Stable WebAR Video</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
width:100%;
height:100%;
background:black;
}

a-scene{
position:fixed !important;
top:0;
left:0;
width:100vw !important;
height:100vh !important;
}

#scanText{
position:fixed;
bottom:30px;
width:100%;
text-align:center;
font-size:18px;
color:#00eaff;
font-family:sans-serif;
z-index:999;
}

#unmuteBtn{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
padding:10px 20px;
border-radius:8px;
border:1px solid white;
background:rgba(0,0,0,0.7);
color:white;
font-size:14px;
display:none;
z-index:1000;
cursor:pointer;
}
</style>
</head>

<body>

<div id="scanText">Scan Logo</div>
<button id="unmuteBtn">Tap for Sound 🔊</button>

<a-scene
mindar-image="
imageTargetSrc: ./targets.mind;
uiScanning:no;
uiLoading:no;
"
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:true"
renderer="alpha:true">

<a-assets>
<video id="video"
src="./video.mp4"
loop
muted
playsinline
webkit-playsinline
crossorigin="anonymous">
</video>
</a-assets>

<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

<!-- image tracker -->
<a-entity id="marker" mindar-image-target="targetIndex:0"></a-entity>

<!-- screen fixed video -->
<a-entity id="screenVideo" visible="false">
<a-video
src="#video"
width="2.6"
height="3.6"
position="0 0 -2.5">
</a-video>
</a-entity>

</a-scene>

<script>
const video=document.querySelector("#video");
const marker=document.querySelector("#marker");
const screenVideo=document.querySelector("#screenVideo");
const scanText=document.querySelector("#scanText");
const unmute=document.querySelector("#unmuteBtn");

let detected=false;
let unlocked=false;

/* unlock audio */
function unlock(){
if(unlocked) return;
unlocked=true;

try{
const AudioContext=window.AudioContext||window.webkitAudioContext;
const ctx=new AudioContext();
ctx.resume();
}catch(e){}

video.muted=false;

if(detected) video.play();

unmute.style.display="none";
}

document.addEventListener("click",unlock);
document.addEventListener("touchend",unlock);

/* when image found */
marker.addEventListener("targetFound",()=>{

detected=true;
scanText.style.display="none";
screenVideo.setAttribute("visible",true);

video.play().then(()=>{
if(!unlocked) unmute.style.display="block";
});

});

/* when image lost */
marker.addEventListener("targetLost",()=>{

detected=false;
scanText.style.display="block";
screenVideo.setAttribute("visible",false);
video.pause();
unmute.style.display="none";

});

/* iOS permission */
window.addEventListener("load",()=>{
if(typeof DeviceOrientationEvent!=="undefined" &&
typeof DeviceOrientationEvent.requestPermission==="function"){

const ask=()=>{
DeviceOrientationEvent.requestPermission()
.then(()=>{})
.catch(()=>{});

document.removeEventListener("touchend",ask);
};

document.addEventListener("touchend",ask);
}
});
</script>

</body>
</html>
