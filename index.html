<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>WebAR Floating Video</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
}

/* Camera background */
#camera-bg{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:1;
}

/* AR scene */
a-scene{
position:fixed !important;
top:0 !important;
left:0 !important;
width:100vw !important;
height:100vh !important;
z-index:2 !important;
background:transparent !important;
pointer-events:none;
}

a-scene canvas{
background:transparent !important;
}

/* Instruction text */
.instruction-container{
position:fixed;
bottom:30px;
width:100%;
text-align:center;
z-index:20;
pointer-events:none;
}

.instruction-text{
font-size:1rem;
color:#4facfe;
background:rgba(0,0,0,0.7);
padding:10px 20px;
border-radius:10px;
border:1px solid #4facfe;
display:inline-block;
text-transform:uppercase;
}

/* Unmute button */
#unmute-btn{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:20;
background:rgba(0,0,0,0.75);
color:#fff;
border:1px solid #fff;
border-radius:8px;
padding:8px 18px;
font-size:.9rem;
cursor:pointer;
display:none;
}
</style>
</head>

<body>

<!-- Camera background -->
<video id="camera-bg" autoplay playsinline muted></video>

<button id="unmute-btn">🔊 Tap to Unmute</button>

<div class="instruction-container" id="instruction-container">
<div class="instruction-text">Scan Amcet Logo</div>
</div>

<!-- Hidden video source -->
<video id="video-src"
src="./video.mp4"
preload="auto"
loop
muted
playsinline
webkit-playsinline></video>

<!-- AR Scene -->
<a-scene
mindar-image="imageTargetSrc: ./targets.mind; uiScanning: no; uiLoading: no;"
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:true"
renderer="colorManagement:true; alpha:true; antialias:false;"
color-space="sRGB">

<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

<a-entity mindar-image-target="targetIndex:0" id="target">

<a-video
id="ar-video"
src="#video-src"
width="1.6"
height="0.9"
position="0 0 0"
visible="false">
</a-video>

</a-entity>

</a-scene>

<script>
const video = document.getElementById("video-src");
const plane = document.getElementById("ar-video");
const cameraBg = document.getElementById("camera-bg");
const target = document.getElementById("target");
const instruction = document.getElementById("instruction-container");
const unmuteBtn = document.getElementById("unmute-btn");

let visible=false;
let audioUnlocked=false;

/* Start real camera */
async function startCamera(){
try{
const stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:{ideal:"environment"}},
audio:false
});
cameraBg.srcObject=stream;
}catch(err){
console.warn(err);
}}
startCamera();

/* Hide MindAR internal video */
document.querySelector("a-scene").addEventListener("loaded",()=>{
setTimeout(()=>{
document.querySelectorAll("a-scene video").forEach(v=>{
if(v.id!=="video-src")v.style.display="none";
});
},500);
});

/* Unlock audio */
function unlockAudio(){
if(audioUnlocked)return;
audioUnlocked=true;

try{
const AC=window.AudioContext||window.webkitAudioContext;
if(AC)new AC().resume();
}catch(e){}

video.muted=false;

if(visible && video.paused)
video.play().catch(()=>{});

unmuteBtn.style.display="none";
}

document.addEventListener("click",unlockAudio);
document.addEventListener("touchend",unlockAudio);

/* Target found */
target.addEventListener("targetFound",()=>{
visible=true;
instruction.style.display="none";
plane.setAttribute("visible",true);

video.play().then(()=>{
if(!audioUnlocked)
unmuteBtn.style.display="block";
}).catch(()=>{
unmuteBtn.style.display="block";
});
});

/* Target lost */
target.addEventListener("targetLost",()=>{
visible=false;
instruction.style.display="block";
unmuteBtn.style.display="none";
plane.setAttribute("visible",false);

video.pause();
video.currentTime=0;
});

/* iOS permission */
window.addEventListener("load",()=>{
if(typeof DeviceOrientationEvent?.requestPermission==="function"){
const req=()=>{
DeviceOrientationEvent.requestPermission()
.then(r=>{
if(r==="granted")
window.addEventListener("deviceorientation",()=>{});
})
.catch(console.error);

document.removeEventListener("touchend",req);
};
document.addEventListener("touchend",req);
}
});
</script>

</body>
</html>
