<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Fullscreen AR Video</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
width:100%;
height:100%;
background:black;
}

#scanText{
position:fixed;
bottom:40px;
width:100%;
text-align:center;
font-size:18px;
color:#00eaff;
font-family:sans-serif;
z-index:999;
}

#unmuteBtn{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
padding:10px 20px;
border-radius:8px;
border:1px solid white;
background:rgba(0,0,0,0.7);
color:white;
display:none;
z-index:1000;
}
</style>
</head>

<body>

<div id="scanText">Scan Logo</div>
<button id="unmuteBtn">Tap for Sound 🔊</button>

<a-scene
mindar-image="imageTargetSrc: ./targets.mind; uiScanning:no; uiLoading:no;"
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:true"
renderer="alpha:true">

<a-assets>
<video id="video"
src="./video.mp4"
loop
muted
playsinline
webkit-playsinline
crossorigin="anonymous">
</video>
</a-assets>

<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

<!-- marker trigger only -->
<a-entity id="marker" mindar-image-target="targetIndex:0"></a-entity>

</a-scene>

<!-- FULLSCREEN VIDEO LAYER -->
<video id="fullscreenVideo"
style="
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
display:none;
z-index:998;
"
playsinline
webkit-playsinline
muted
></video>

<script>
const arVideo=document.querySelector("#video");
const fullscreenVideo=document.querySelector("#fullscreenVideo");
const marker=document.querySelector("#marker");
const scanText=document.querySelector("#scanText");
const unmute=document.querySelector("#unmuteBtn");

let unlocked=false;

/* sync source */
fullscreenVideo.src=arVideo.src;

/* unlock sound */
function unlock(){
if(unlocked) return;
unlocked=true;

fullscreenVideo.muted=false;
fullscreenVideo.play();

unmute.style.display="none";
}

document.addEventListener("click",unlock);
document.addEventListener("touchend",unlock);

/* when logo scanned */
marker.addEventListener("targetFound",()=>{

scanText.style.display="none";

fullscreenVideo.style.display="block";
fullscreenVideo.play().catch(()=>{
unmute.style.display="block";
});

});

/* when logo lost */
marker.addEventListener("targetLost",()=>{

scanText.style.display="block";

fullscreenVideo.pause();
fullscreenVideo.style.display="none";
unmute.style.display="none";

});

/* iOS permission fix */
window.addEventListener("load",()=>{
if(typeof DeviceOrientationEvent!=="undefined" &&
typeof DeviceOrientationEvent.requestPermission==="function"){

const ask=()=>{
DeviceOrientationEvent.requestPermission()
.then(()=>{})
.catch(()=>{});

document.removeEventListener("touchend",ask);
};

document.addEventListener("touchend",ask);
}
});
</script>

</body>
</html>
