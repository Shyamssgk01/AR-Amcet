<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>WebAR Stable</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
html, body{
  margin:0;
  padding:0;
  overflow:hidden;
  width:100%;
  height:100%;
  background:transparent;
}

a-scene{
  position:fixed !important;
  top:0;
  left:0;
  width:100vw !important;
  height:100vh !important;
  background:transparent !important;
}

.instruction-container{
  position:fixed;
  bottom:30px;
  width:100%;
  text-align:center;
  z-index:999;
  pointer-events:none;
}

.instruction-text{
  font-size:1rem;
  color:#4facfe;
  background:rgba(0,0,0,0.7);
  padding:10px 20px;
  border-radius:10px;
  border:1px solid #4facfe;
  display:inline-block;
  text-transform:uppercase;
}

#unmute-btn{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  z-index:1000;
  background:rgba(0,0,0,0.75);
  color:#fff;
  border:1px solid #fff;
  border-radius:8px;
  padding:8px 18px;
  font-size:0.9rem;
  cursor:pointer;
  display:none;
}
</style>
</head>

<body>

<button id="unmute-btn">🔊 Tap to Unmute</button>

<div class="instruction-container" id="instruction-container">
  <div class="instruction-text">
    Scan Amcet Logo
  </div>
</div>

<a-scene
  mindar-image="
    imageTargetSrc: ./targets.mind;
    uiScanning: no;
    uiLoading: no;
    filterMinCF: 0.0005;
    filterBeta: 0.005;
    warmupTolerance: 5;
    missTolerance: 5;
  "
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
  renderer="colorManagement: true; alpha: true;"
  color-space="sRGB">

  <a-assets>
    <video id="ar-video"
      src="./video.mp4"
      preload="auto"
      loop
      muted
      playsinline
      webkit-playsinline
      crossorigin="anonymous">
    </video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0" id="target">
    <a-video
      src="#ar-video"
      width="0.9"
      height="0.9"
      position="0 0 0">
    </a-video>
  </a-entity>

</a-scene>

<script>
const video = document.getElementById('ar-video');
const target = document.getElementById('target');
const instruction = document.getElementById('instruction-container');
const unmuteBtn = document.getElementById('unmute-btn');

let visible=false;
let audioUnlocked=false;

video.muted=true;
video.setAttribute('playsinline','');
video.setAttribute('webkit-playsinline','');

function unlockAudio(){
  if(audioUnlocked) return;
  audioUnlocked=true;

  try{
    const AudioContext=window.AudioContext||window.webkitAudioContext;
    if(AudioContext){
      const ctx=new AudioContext();
      ctx.resume();
    }
  }catch(e){}

  video.muted=false;

  if(visible && video.paused){
    video.play().catch(()=>{});
  }

  unmuteBtn.style.display="none";
}

document.addEventListener('click',unlockAudio);
document.addEventListener('touchend',unlockAudio);

target.addEventListener('targetFound',()=>{
  visible=true;
  instruction.style.display="none";

  video.play().then(()=>{
    if(!audioUnlocked){
      unmuteBtn.style.display="block";
    }
  }).catch(()=>{
    unmuteBtn.style.display="block";
  });
});

target.addEventListener('targetLost',()=>{
  visible=false;
  instruction.style.display="block";
  unmuteBtn.style.display="none";
  video.pause();
});

window.addEventListener('load',()=>{
  if(
    typeof DeviceOrientationEvent!=='undefined' &&
    typeof DeviceOrientationEvent.requestPermission==='function'
  ){
    const requestPerm=()=>{
      DeviceOrientationEvent.requestPermission()
      .then(res=>{
        if(res==='granted'){
          window.addEventListener('deviceorientation',()=>{});
        }
      })
      .catch(console.error);

      document.removeEventListener('touchend',requestPerm);
    };

    document.addEventListener('touchend',requestPerm);
  }
});
</script>

</body>
</html>
